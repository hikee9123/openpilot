<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSM Roads DB Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101216;
      --panel: #181d24;
      --panel-2: #222933;
      --text: #edf1f7;
      --muted: #9da8b8;
      --line: #313a47;
      --accent: #41c7a7;
      --warn: #e9b44c;
      --bad: #f06c75;
      --good: #65d17d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .path {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .health {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 7px;
      max-width: min(760px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .health-text {
      min-width: 0;
    }

    .health-actions {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .health button {
      height: 24px;
      border-radius: 5px;
      padding: 0 7px;
      font-size: 11px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .health.ok {
      border-color: #2e6f54;
      color: var(--good);
    }

    .health.warn {
      border-color: #806b32;
      color: var(--warn);
    }

    .health.bad {
      border-color: #8a3e47;
      color: var(--bad);
    }

    .controls,
    .stats {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mode-toggle {
      display: flex;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #10151c;
      padding: 3px;
    }

    .mode-toggle button {
      height: 28px;
      border-color: transparent;
      padding: 0 9px;
    }

    .mode-toggle button.active {
      border-color: var(--accent);
      background: #193f3a;
    }

    .opacity-control {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .opacity-control input {
      width: 130px;
      accent-color: var(--accent);
    }

    .opacity-control.disabled {
      opacity: 0.45;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 6px 9px;
      min-width: 92px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      color: var(--text);
      font-size: 14px;
    }

    button,
    a.button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    button:hover,
    a.button:hover {
      border-color: var(--accent);
    }

    main {
      min-height: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 420px;
      background: #0c0f13;
    }

    .status {
      position: absolute;
      z-index: 500;
      left: 12px;
      bottom: 12px;
      max-width: min(620px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(24, 29, 36, 0.92);
      color: var(--muted);
      padding: 8px 10px;
      font-size: 12px;
      backdrop-filter: blur(6px);
    }

    .leaflet-container {
      background: #0c0f13;
      color: #18202a;
      font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (max-width: 840px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .controls,
      .stats {
        justify-content: stretch;
      }

      .mode-toggle {
        width: 100%;
      }

      .mode-toggle button {
        flex: 1 1 0;
      }

      .opacity-control {
        width: 100%;
        justify-content: space-between;
      }

      .opacity-control input {
        flex: 1 1 auto;
      }

      .stat,
      button,
      a.button {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>OSM Roads DB 지도</h1>
      <div class="path" id="db-path">DB 조회 중</div>
      <div class="health warn" id="server-health">서버 상태 확인 중</div>
    </div>
    <div class="controls">
      <div class="mode-toggle" aria-label="지도 모드">
        <button data-map-mode="hybrid">OSM+DB</button>
        <button data-map-mode="db">DB만</button>
        <button data-map-mode="osm">OSM만</button>
      </div>
      <div class="mode-toggle" aria-label="데이터 탭">
        <button data-layer-mode="all">전체 도로망</button>
        <button data-layer-mode="matches">카메라 매칭</button>
      </div>
      <label class="opacity-control" id="opacity-control">
        OSM 투명도
        <input id="osm-opacity" type="range" min="15" max="100" step="5">
        <span id="osm-opacity-value">45%</span>
      </label>
      <div class="stats" id="stats"></div>
      <button id="refresh">새로고침</button>
      <a class="button" id="home-link" href="index.html">작업 화면</a>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <div class="status" id="status">지도 초기화 중</div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const apiBase = location.protocol === "file:" ? "http://127.0.0.1:8765" : "";
    const statusEl = document.getElementById("status");
    const pathEl = document.getElementById("db-path");
    const statsEl = document.getElementById("stats");
    const refreshButton = document.getElementById("refresh");
    const homeLink = document.getElementById("home-link");
    const healthEl = document.getElementById("server-health");
    const serverHost = location.protocol === "file:" ? "127.0.0.1" : (location.hostname || "127.0.0.1");
    const serverPort = location.protocol === "file:" ? "8765" : (location.port || "8765");
    const serverCommands = {
      windows: `tools\\osm_roads_webui\\start_server.cmd ${serverPort}`,
      ubuntu: `tools/osm_roads_webui/start_server.sh ${serverPort}`,
    };
    let activePlatform = preferredClientPlatform();
    let startScriptPaths = localStartScriptPaths();
    const modeButtons = document.querySelectorAll("[data-map-mode]");
    const layerButtons = document.querySelectorAll("[data-layer-mode]");
    const opacityControl = document.getElementById("opacity-control");
    const opacityInput = document.getElementById("osm-opacity");
    const opacityValue = document.getElementById("osm-opacity-value");
    let map = null;
    let tileLayer = null;
    let cameraLayer = null;
    let roadLayer = null;
    let loadTimer = null;
    let requestId = 0;
    let lastMapData = null;
    let mapMode = selectedInitialMode();
    let layerMode = selectedInitialLayerMode();
    let osmOpacity = selectedInitialOpacity();

    homeLink.href = new URL("index.html", location.href).href;
    refreshButton.addEventListener("click", () => loadMapData(true));
    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMapMode(button.dataset.mapMode, true));
    });
    layerButtons.forEach((button) => {
      button.addEventListener("click", () => setLayerMode(button.dataset.layerMode, true));
    });
    opacityInput.addEventListener("input", () => setOsmOpacity(opacityInput.value, true));

    async function init() {
      if (!window.L) {
        statusEl.textContent = "지도 라이브러리 로드 실패";
        return;
      }
      map = L.map("map", { preferCanvas: true }).setView([36.35, 127.85], 7);
      tileLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      });
      roadLayer = L.layerGroup();
      cameraLayer = L.layerGroup();
      map.on("moveend zoomend", scheduleLoad);
      await loadSummary();
      applyMapMode(false);
      await loadMapData(true);
    }

    function selectedInitialMode() {
      const urlMode = new URLSearchParams(location.search).get("mode");
      const storedMode = localStorage.getItem("osm_roads_map_mode");
      const mode = urlMode || storedMode || "db";
      return ["hybrid", "db", "osm"].includes(mode) ? mode : "db";
    }

    function selectedInitialLayerMode() {
      const urlLayer = new URLSearchParams(location.search).get("layer");
      const storedLayer = localStorage.getItem("osm_roads_layer_mode");
      const mode = urlLayer || storedLayer || "all";
      return ["all", "matches"].includes(mode) ? mode : "all";
    }

    function selectedInitialOpacity() {
      const urlValue = new URLSearchParams(location.search).get("osm_opacity");
      const storedValue = localStorage.getItem("osm_roads_osm_opacity");
      return clampOpacity(urlValue || storedValue || "45");
    }

    function clampOpacity(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return 45;
      return Math.max(15, Math.min(100, Math.round(parsed / 5) * 5));
    }

    function setOsmOpacity(value, save) {
      osmOpacity = clampOpacity(value);
      if (save) {
        localStorage.setItem("osm_roads_osm_opacity", String(osmOpacity));
      }
      applyOsmOpacity();
    }

    function applyOsmOpacity() {
      opacityInput.value = String(osmOpacity);
      opacityValue.textContent = `${osmOpacity}%`;
      opacityInput.disabled = mapMode === "db";
      opacityControl.classList.toggle("disabled", mapMode === "db");
      if (tileLayer) {
        tileLayer.setOpacity(osmOpacity / 100);
      }
    }

    function setMapMode(mode, reload) {
      if (!["hybrid", "db", "osm"].includes(mode)) return;
      mapMode = mode;
      localStorage.setItem("osm_roads_map_mode", mode);
      applyMapMode(true);
      if (reload && mapMode !== "osm") {
        loadMapData(true);
      }
    }

    function setLayerMode(mode, reload) {
      if (!["all", "matches"].includes(mode)) return;
      layerMode = mode;
      lastMapData = null;
      localStorage.setItem("osm_roads_layer_mode", mode);
      applyLayerMode();
      if (reload && mapMode !== "osm") {
        loadMapData(true);
      }
    }

    function applyLayerMode() {
      layerButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.layerMode === layerMode);
      });
      if (cameraLayer && layerMode === "all") {
        cameraLayer.clearLayers();
      }
    }

    function applyMapMode(updateStatus) {
      modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mapMode === mapMode);
      });
      applyLayerMode();
      applyOsmOpacity();
      if (!map || !tileLayer || !roadLayer || !cameraLayer) return;

      if (mapMode === "hybrid" || mapMode === "osm") {
        if (!map.hasLayer(tileLayer)) tileLayer.addTo(map);
      } else if (map.hasLayer(tileLayer)) {
        map.removeLayer(tileLayer);
      }

      if (mapMode === "hybrid" || mapMode === "db") {
        if (!map.hasLayer(roadLayer)) roadLayer.addTo(map);
        if (!map.hasLayer(cameraLayer)) cameraLayer.addTo(map);
        if (lastMapData) renderMapData(lastMapData);
      } else {
        if (map.hasLayer(roadLayer)) map.removeLayer(roadLayer);
        if (map.hasLayer(cameraLayer)) map.removeLayer(cameraLayer);
        if (updateStatus) statusEl.textContent = `OSM 배경만 표시 | 줌 ${map.getZoom()}`;
      }
      if (updateStatus && mapMode === "db") {
        statusEl.textContent = `DB 데이터만 표시 | 줌 ${map.getZoom()}`;
      }
    }

    async function loadSummary() {
      try {
        const res = await fetch(`${apiBase}/api/db/summary`);
        const data = await res.json();
        if (!res.ok || !data.ok) {
          pathEl.textContent = data.message || "DB 조회 실패";
          return;
        }
        pathEl.textContent = `${data.db_path} | ${formatBytes(data.size_bytes)} | ${formatTimestamp(data.modified_at)}`;
        const counts = data.counts || {};
        statsEl.innerHTML = [
          ["도로", counts.roads],
          ["연결", counts.road_adjacency],
          ["카메라", counts.speed_cameras],
          ["매칭", counts.route_camera_lookup]
        ].map(([label, value]) => `
          <div class="stat"><span>${label}</span><strong>${formatNumber(value)}</strong></div>
        `).join("");
      } catch (e) {
        pathEl.textContent = `DB 조회 실패: ${e.message}`;
      }
    }

    async function refreshHealth() {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 2500);
      const started = performance.now();
      try {
        const res = await fetch(`${apiBase}/api/health`, { signal: controller.signal, cache: "no-store" });
        const data = await res.json();
        const latencyMs = Math.round(performance.now() - started);
        renderHealth(data, latencyMs);
      } catch (e) {
        const reason = e.name === "AbortError" ? "응답 시간 초과" : e.message;
        setHealth("bad", `서버 오프라인 | ${reason}`, "", true, false);
      } finally {
        clearTimeout(timeout);
      }
    }

    function renderHealth(data, latencyMs) {
      const db = data.db || {};
      const server = data.server || {};
      if (data.platform) {
        activePlatform = data.platform;
      }
      if (data.start_scripts) {
        startScriptPaths = { ...startScriptPaths, ...data.start_scripts };
      }
      if (data.start_script_path) {
        startScriptPaths[activePlatform] = data.start_script_path;
      }
      const host = server.host && server.port ? `${server.host}:${server.port}` : "서버";
      const pathMode = db.uses_default_path ? "기본 DB" : "사용자 DB";
      const sizeText = db.size_bytes ? ` | ${formatBytes(db.size_bytes)}` : "";
      if (db.read_blocked) {
        setHealth(
          "warn",
          `${host} 온라인 | DB 교체 중 | DB 조회 일시 중지${sizeText}`,
          `${db.configured_path || ""}`,
          false,
          true,
        );
        return;
      }
      if (data.ok) {
        setHealth(
          db.uses_default_path ? "ok" : "warn",
          `${host} 온라인 | ${pathMode} OK${sizeText} | API ${latencyMs}ms`,
          `${db.configured_path || ""}`,
          false,
          true,
        );
        return;
      }
      const reason = db.error || (db.exists ? "스키마/스모크 테스트 실패" : "DB 파일 없음");
      setHealth("bad", `${host} 온라인 | ${pathMode} 오류: ${reason}`, `${db.configured_path || ""}`, false, true);
    }

    function setHealth(stateClass, text, title, showCopy, showOpen) {
      const textEl = document.createElement("span");
      textEl.className = "health-text";
      textEl.textContent = text;
      const actionsEl = document.createElement("span");
      actionsEl.className = "health-actions";

      const retryButton = document.createElement("button");
      retryButton.type = "button";
      retryButton.textContent = "다시 확인";
      retryButton.addEventListener("click", forceOnlineCheck);
      actionsEl.appendChild(retryButton);

      if (showCopy) {
        for (const platform of ["windows", "ubuntu"]) {
          const copyButton = document.createElement("button");
          copyButton.type = "button";
          copyButton.textContent = `${platformLabel(platform)} 실행 복사`;
          copyButton.addEventListener("click", () => copyServerCommand(copyButton, platform));
          actionsEl.appendChild(copyButton);

          const pathButton = document.createElement("button");
          pathButton.type = "button";
          pathButton.textContent = `${platformLabel(platform)} 경로 복사`;
          pathButton.addEventListener("click", () => copyStartScriptPath(pathButton, platform));
          actionsEl.appendChild(pathButton);
        }
      }

      if (showOpen) {
        const openButton = document.createElement("button");
        openButton.type = "button";
        openButton.textContent = `${platformLabel(activePlatform)} 위치 열기`;
        openButton.addEventListener("click", () => openStartScriptFolder(openButton));
        actionsEl.appendChild(openButton);
      }

      healthEl.className = `health ${stateClass}`;
      healthEl.title = title || "";
      healthEl.replaceChildren(textEl, actionsEl);
    }

    function forceOnlineCheck() {
      refreshHealth();
      loadSummary();
      loadMapData(true);
    }

    async function copyServerCommand(button, platform) {
      const command = serverCommands[platform] || serverCommands.windows;
      const copied = await copyText(command);
      if (!copied) {
        window.prompt(`${platformLabel(platform)} 서버 실행 명령`, command);
        return;
      }
      const previousText = button.textContent;
      button.textContent = "복사됨";
      setTimeout(() => {
        button.textContent = previousText;
      }, 1500);
    }

    async function copyStartScriptPath(button, platform) {
      const path = startScriptPaths[platform] || startScriptPaths.windows;
      const copied = await copyText(path);
      if (!copied) {
        window.prompt(`${platformLabel(platform)} 시작 스크립트 경로`, path);
        return;
      }
      const previousText = button.textContent;
      button.textContent = "복사됨";
      setTimeout(() => {
        button.textContent = previousText;
      }, 1500);
    }

    async function openStartScriptFolder(button) {
      const previousText = button.textContent;
      button.disabled = true;
      button.textContent = "여는 중";
      try {
        const res = await fetch(`${apiBase}/api/open/start-script-folder`, { method: "POST" });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          alert(data.message || "파일 탐색기 열기 실패");
        }
      } catch (e) {
        alert(`파일 탐색기 열기 실패: ${e.message}`);
      } finally {
        button.disabled = false;
        button.textContent = previousText;
      }
    }

    function preferredClientPlatform() {
      const platform = `${navigator.platform || ""} ${navigator.userAgent || ""}`.toLowerCase();
      if (platform.includes("win")) return "windows";
      if (platform.includes("linux") || platform.includes("ubuntu")) return "ubuntu";
      return "windows";
    }

    function platformLabel(platform) {
      return platform === "ubuntu" ? "Ubuntu" : "Windows";
    }

    function localStartScriptPaths() {
      if (location.protocol === "file:") {
        const windowsPath = decodeURIComponent(new URL("start_server.cmd", location.href).pathname)
          .replace(/^\/([A-Za-z]:)/, "$1")
          .replaceAll("/", "\\");
        const ubuntuPath = decodeURIComponent(new URL("start_server.sh", location.href).pathname);
        return { windows: windowsPath, ubuntu: ubuntuPath };
      }
      return {
        windows: "tools\\osm_roads_webui\\start_server.cmd",
        ubuntu: "tools/osm_roads_webui/start_server.sh",
      };
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {
        // Fall back to a temporary textarea below.
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        return document.execCommand("copy");
      } finally {
        textarea.remove();
      }
    }

    function scheduleLoad() {
      if (mapMode === "osm") {
        statusEl.textContent = `OSM 배경만 표시 | 줌 ${map.getZoom()}`;
        return;
      }
      clearTimeout(loadTimer);
      loadTimer = setTimeout(() => loadMapData(false), 300);
    }

    async function loadMapData(force) {
      if (!map) return;
      if (mapMode === "osm") {
        statusEl.textContent = `OSM 배경만 표시 | 줌 ${map.getZoom()}`;
        return;
      }
      const currentRequest = ++requestId;
      const bounds = map.getBounds();
      const bbox = [
        bounds.getWest(),
        bounds.getSouth(),
        bounds.getEast(),
        bounds.getNorth()
      ].map((value) => value.toFixed(6)).join(",");
      statusEl.textContent = force ? "지도 데이터 새로고침 중" : "지도 데이터 조회 중";
      try {
        const res = await fetch(mapDataUrl(bbox));
        const data = await res.json();
        if (currentRequest !== requestId) return;
        if (!res.ok || !data.ok) {
          statusEl.textContent = data.message || "지도 조회 실패";
          return;
        }
        lastMapData = data;
        renderMapData(data);
      } catch (e) {
        if (currentRequest === requestId) {
          if (isConnectionError(e)) {
            switchToOsmFallback(`서버 연결 실패: ${e.message}`);
          } else {
            statusEl.textContent = `지도 조회 실패: ${e.message}`;
          }
        }
      }
    }

    function isConnectionError(error) {
      const message = String(error && error.message || "");
      return error instanceof TypeError || /failed to fetch|networkerror|load failed/i.test(message);
    }

    function switchToOsmFallback(message) {
      mapMode = "osm";
      applyMapMode(false);
      statusEl.textContent = `${message} | OSM 배경만 표시`;
    }

    function mapDataUrl(bbox) {
      if (layerMode === "all") {
        const params = fullRoadParams();
        return `${apiBase}/api/db/roads?bbox=${encodeURIComponent(bbox)}&road_limit=${params.limit}&min_priority=${params.minPriority}`;
      }
      return `${apiBase}/api/db/map?bbox=${encodeURIComponent(bbox)}&camera_limit=1200&road_limit=1800`;
    }

    function fullRoadParams() {
      const zoom = map.getZoom();
      if (zoom <= 7) return { limit: 8000, minPriority: 60 };
      if (zoom <= 9) return { limit: 12000, minPriority: 35 };
      if (zoom <= 11) return { limit: 20000, minPriority: 15 };
      return { limit: 35000, minPriority: 0 };
    }

    function renderMapData(data) {
      roadLayer.clearLayers();
      cameraLayer.clearLayers();
      for (const road of data.roads || []) {
        const line = L.polyline(
          [[Number(road.lat1), Number(road.lon1)], [Number(road.lat2), Number(road.lon2)]],
          {
            color: roadColor(road.highway),
            weight: layerMode === "all" ? Math.max(1, roadWeight(road.highway) - 1) : roadWeight(road.highway),
            opacity: layerMode === "all" ? 0.58 : 0.72
          }
        );
        line.bindPopup(roadPopup(road));
        line.addTo(roadLayer);
      }
      if (layerMode === "matches") {
        for (const camera of data.cameras || []) {
          const marker = L.circleMarker([Number(camera.lat), Number(camera.lon)], {
            radius: 5,
            color: cameraDisplayColor(camera),
            fillColor: cameraDisplayColor(camera),
            fillOpacity: 0.88,
            weight: 1.5
          });
          marker.bindPopup(cameraPopup(camera));
          marker.addTo(cameraLayer);
        }
      }
      const cameras = (data.cameras || []).length;
      const roads = (data.roads || []).length;
      const roadLimit = Number((data.limits || {}).road_limit);
      const cameraLimit = Number((data.limits || {}).camera_limit);
      const limited = (Number.isFinite(cameraLimit) && cameras >= cameraLimit) || (Number.isFinite(roadLimit) && roads >= roadLimit);
      const modeLabel = mapMode === "hybrid" ? "OSM+DB" : "DB만";
      const layerLabel = layerMode === "all" ? "전체 도로망" : "카메라 매칭";
      const cameraText = layerMode === "matches" ? ` | 화면 카메라 ${formatNumber(cameras)}` : "";
      const minPriority = (data.limits || {}).min_priority;
      const priorityText = layerMode === "all" && Number(minPriority) > 0 ? ` | 우선순위 ${formatCell(minPriority)}+` : "";
      statusEl.textContent = `${modeLabel} ${layerLabel} ${limited ? "일부 표시" : "표시 완료"} | 도로 ${formatNumber(roads)}${cameraText}${priorityText} | 줌 ${map.getZoom()}`;
    }

    function roadPopup(road) {
      if (layerMode === "all") {
        return `
          <strong>${escapeHtml(road.name || road.ref || "road")}</strong><br>
          road_id ${escapeHtml(road.id)}<br>
          ${escapeHtml(road.highway || "-")} / priority ${escapeHtml(formatCell(road.road_priority))}<br>
          length ${escapeHtml(formatCell(road.segment_length))}m
        `;
      }
      return `
        <strong>${escapeHtml(road.name || road.ref || "road")}</strong><br>
        road_id ${escapeHtml(road.road_id)} / camera ${escapeHtml(road.camera_id)}<br>
        ${escapeHtml(road.highway || "-")} / confidence ${escapeHtml(formatCell(road.match_confidence))}
      `;
    }

    function roadColor(highway) {
      if (highway === "motorway" || highway === "trunk") return "#f06c75";
      if (highway === "primary") return "#e9b44c";
      if (highway === "secondary" || highway === "tertiary") return "#41c7a7";
      return "#9da8b8";
    }

    function roadWeight(highway) {
      if (highway === "motorway" || highway === "trunk") return 4;
      if (highway === "primary") return 3;
      return 2;
    }

    function cameraColor(speed) {
      const value = Number(speed);
      if (Number.isFinite(value) && value >= 80) return "#f06c75";
      if (Number.isFinite(value) && value <= 30) return "#e9b44c";
      return "#65d17d";
    }

    function cameraDisplayColor(camera) {
      if ((camera.display_class || "") === "suspicious") return "#f59e0b";
      if ((camera.display_class || "") === "rejected") return "#94a3b8";
      return cameraColor(camera.speed_limit_kph);
    }

    function cameraPopup(camera) {
      const displayClass = camera.display_class || "unknown";
      const verdict = camera.direction_verdict || "-";
      const reason = camera.reject_reason || "-";
      const opposite = Number(camera.opposite_road_id) > 0
        ? `<br>opposite road ${escapeHtml(camera.opposite_road_id)} / ${escapeHtml(formatCell(camera.opposite_match_distance_m))}m / confidence ${escapeHtml(formatCell(camera.opposite_match_confidence))}`
        : "";
      return `
        <strong>camera ${escapeHtml(camera.id)}</strong><br>
        상태 ${escapeHtml(displayClass)} / ${escapeHtml(verdict)}<br>
        사유 ${escapeHtml(reason)}<br>
        제한속도 ${escapeHtml(formatSpeed(camera.speed_limit_kph))}<br>
        ${escapeHtml(camera.address || camera.road_name || "-")}<br>
        road ${escapeHtml(camera.road_id || "-")} ${escapeHtml(camera.matched_road_name || camera.matched_road_ref || "")}<br>
        거리 ${escapeHtml(formatCell(camera.match_distance_m))}m / confidence ${escapeHtml(formatCell(camera.match_confidence))}${opposite}
      `;
    }

    function formatSpeed(speed) {
      const value = Number(speed);
      return Number.isFinite(value) && value > 0 ? `${value} km/h` : "-";
    }

    function formatBytes(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) return "-";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let size = value;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      return unit === 0 ? `${Math.round(size)} ${units[unit]}` : `${size.toFixed(1)} ${units[unit]}`;
    }

    function formatNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toLocaleString() : "-";
    }

    function formatTimestamp(seconds) {
      const value = Number(seconds);
      if (!Number.isFinite(value) || value <= 0) return "-";
      return new Date(value * 1000).toLocaleString();
    }

    function formatCell(value) {
      if (value === null || value === undefined || value === "") return "-";
      if (typeof value === "number" && Number.isFinite(value)) return value.toLocaleString();
      return String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    init();
    refreshHealth();
    setInterval(refreshHealth, 10000);
  </script>
</body>
</html>
