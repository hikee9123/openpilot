<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSM Roads DB</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #191d24;
      --panel-2: #202632;
      --text: #edf1f7;
      --muted: #9da8b8;
      --line: #303846;
      --accent: #41c7a7;
      --warn: #e9b44c;
      --bad: #f06c75;
      --good: #65d17d;
      --idle: #778293;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
    }

    .notice {
      display: none;
      margin-top: 14px;
      border: 1px solid #6f5724;
      border-radius: 8px;
      background: #241d10;
      color: #f2d99a;
      padding: 10px 12px;
    }

    .notice.show {
      display: block;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.primary {
      background: #1b6f62;
      border-color: #2aa891;
    }

    button.danger {
      background: #64252b;
      border-color: #99414b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      min-width: 0;
    }

    .task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-title {
      font-size: 16px;
      font-weight: 700;
    }

    .status {
      min-width: 74px;
      text-align: center;
      border-radius: 999px;
      padding: 3px 9px;
      color: #0b1014;
      background: var(--idle);
      font-size: 12px;
      font-weight: 800;
    }

    .status.running,
    .status.stopping {
      background: var(--warn);
    }

    .status.success {
      background: var(--good);
    }

    .status.failed,
    .status.stopped {
      background: var(--bad);
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      background: #0c0f13;
      overflow: hidden;
      margin: 13px 0 9px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 160ms ease;
    }

    .meta {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 5px 10px;
      color: var(--muted);
      min-height: 56px;
    }

    .meta span:nth-child(even) {
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .log-shell {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #090b0f;
      overflow: hidden;
    }

    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #12161d;
      color: var(--muted);
    }

    pre {
      margin: 0;
      padding: 12px;
      height: 360px;
      overflow: auto;
      color: #d7dde8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 12px/1.45 Consolas, "Liberation Mono", monospace;
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 20px, 720px);
        padding: 16px 0;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: stretch;
      }

      button {
        flex: 1 1 160px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>OSM Roads DB</h1>
        <div class="sub" id="summary">연결 대기</div>
      </div>
      <div class="toolbar">
        <button data-task="download">PBF 다운로드</button>
        <button class="primary" data-task="build">DB 생성</button>
        <button data-task="validate">DB 검증</button>
        <button data-task="upload_dry_run">업로드 확인</button>
        <button class="primary" data-task="upload_push">GitHub 업로드</button>
        <button class="danger" id="stop" disabled>중지</button>
      </div>
    </header>
    <div class="notice" id="notice"></div>

    <section class="grid" id="tasks"></section>

    <section class="log-shell">
      <div class="log-head">
        <strong id="log-title">로그</strong>
        <span id="event-state">SSE 연결 중</span>
      </div>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const taskOrder = ["download", "build", "validate", "upload_dry_run", "upload_push"];
    const statusText = {
      idle: "대기",
      running: "실행",
      stopping: "중지",
      success: "성공",
      failed: "실패",
      stopped: "중지됨"
    };
    const taskRoot = document.getElementById("tasks");
    const logEl = document.getElementById("log");
    const logTitle = document.getElementById("log-title");
    const summary = document.getElementById("summary");
    const eventState = document.getElementById("event-state");
    const notice = document.getElementById("notice");
    const stopButton = document.getElementById("stop");
    const apiBase = location.protocol === "file:" ? "http://127.0.0.1:8765" : "";
    let state = null;
    let selectedTask = "download";

    if (location.protocol === "file:") {
      notice.classList.add("show");
      notice.textContent = "HTML 파일을 직접 열었습니다. API는 http://127.0.0.1:8765 로 연결합니다. 서버가 꺼져 있으면 python tools/scripts/osm_roads_webui.py --host 127.0.0.1 --port 8765 를 먼저 실행하세요.";
    }

    function taskTemplate(key) {
      const el = document.createElement("article");
      el.className = "task";
      el.id = `task-${key}`;
      el.innerHTML = `
        <div class="task-head">
          <div class="task-title"></div>
          <div class="status"></div>
        </div>
        <div class="progress"><div class="bar"></div></div>
        <div class="meta">
          <span>진행률</span><span class="percent"></span>
          <span>메시지</span><span class="message"></span>
          <span>시작</span><span class="started"></span>
          <span>종료</span><span class="finished"></span>
        </div>
      `;
      el.addEventListener("click", () => {
        selectedTask = key;
        renderLog();
      });
      return el;
    }

    for (const key of taskOrder) {
      taskRoot.appendChild(taskTemplate(key));
    }

    async function post(path) {
      try {
        const res = await fetch(`${apiBase}${path}`, { method: "POST" });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          alert(data.message || "요청 실패");
        }
      } catch (e) {
        const message = `서버 요청 실패: ${e.message}`;
        summary.textContent = message;
        eventState.textContent = "서버 연결 실패";
        alert(`${message}\n\n서버 실행:\npython tools/scripts/osm_roads_webui.py --host 127.0.0.1 --port 8765`);
      }
    }

    document.querySelectorAll("[data-task]").forEach((button) => {
      button.addEventListener("click", async () => {
        const task = button.dataset.task;
        if (task === "upload_push" && !confirm("GitHub에 커밋/푸시를 진행할까요?")) {
          return;
        }
        selectedTask = task;
        await post(`/api/tasks/${task}`);
      });
    });

    stopButton.addEventListener("click", () => post("/api/stop"));

    function render(nextState) {
      state = nextState;
      const busy = Boolean(state.busy);
      const active = state.active_task;
      summary.textContent = busy ? `${state.tasks[active].label} 실행 중` : "대기 중";
      stopButton.disabled = !busy;
      document.querySelectorAll("[data-task]").forEach((button) => {
        button.disabled = busy;
      });

      for (const key of taskOrder) {
        const task = state.tasks[key];
        const el = document.getElementById(`task-${key}`);
        el.querySelector(".task-title").textContent = task.label;
        const status = el.querySelector(".status");
        status.className = `status ${task.status}`;
        status.textContent = statusText[task.status] || task.status;
        el.querySelector(".bar").style.width = `${Math.max(0, Math.min(100, task.progress))}%`;
        el.querySelector(".percent").textContent = `${task.progress}%`;
        el.querySelector(".message").textContent = task.message || "-";
        el.querySelector(".started").textContent = task.started_at || "-";
        el.querySelector(".finished").textContent = task.finished_at || "-";
      }
      renderLog();
    }

    function renderLog() {
      if (!state) return;
      const active = state.active_task || selectedTask;
      const task = state.tasks[active] || state.tasks[selectedTask];
      logTitle.textContent = `${task.label} 로그`;
      logEl.textContent = task.log.join("\n");
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function pollState() {
      try {
        const res = await fetch(`${apiBase}/api/state`);
        render(await res.json());
      } catch (e) {
        eventState.textContent = "상태 조회 실패";
        summary.textContent = `서버 연결 실패: ${e.message}`;
      }
    }

    function connectEvents() {
      const events = new EventSource(`${apiBase}/api/events`);
      events.onopen = () => {
        eventState.textContent = "SSE 연결됨";
      };
      events.onmessage = (event) => {
        render(JSON.parse(event.data));
      };
      events.onerror = () => {
        eventState.textContent = "SSE 재연결 중";
      };
    }

    pollState();
    connectEvents();
  </script>
</body>
</html>
